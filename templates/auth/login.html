{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-container">
    
    <div class="auth-card">

        <div class="auth-header">
            <div class="auth-icon">🅿️</div>
            <h1>Campus Parking</h1>
            <p class="auth-subtitle">
                Sign in to manage your parking
            </p>
        </div>

        <form method="POST"
              action="{{ url_for('auth.login') }}"
              class="auth-form"
              id="loginForm">

            <!-- EMAIL -->
            <div class="form-group">

                <label for="email">Email Address</label>

                <input
                    type="text"
                    id="email"
                    name="email"
                    required
                    placeholder="admin@campus.edu"
                    autocomplete="email"
                >

                <small id="emailError"
                       style="color:red;font-size:13px;"></small>

            </div>

            <!-- PASSWORD -->
            <div class="form-group">

                <label for="password">Password</label>

                <input
                    type="password"
                    id="password"
                    name="password"
                    required
                    placeholder="••••••••"
                    autocomplete="current-password"
                >

            </div>

            <!-- BUTTON -->
            <button type="submit"
                    class="btn btn-primary btn-full"
                    id="loginBtn">

                Sign In

            </button>

        </form>

        <div class="auth-footer">
            <p>
                Accounts are managed by administrators.<br>
                Contact admin if you need access.
            </p>
        </div>

    </div>

</div>

<script>

document.getElementById("loginForm")
.addEventListener("submit", function(e){

    const emailInput =
        document.getElementById("email");

    const errorText =
        document.getElementById("emailError");

    const email =
        emailInput.value.trim();

    // reset lỗi
    errorText.textContent = "";

    // phải có @
    if(!email.includes("@")){

        e.preventDefault();

        errorText.textContent =
            "Email must contain @";

        return;
    }

    // chỉ cho email campus hợp lệ
    const regex =
        /^[a-zA-Z0-9._-]+@campus\.edu$/;

    if(!regex.test(email)){

        e.preventDefault();

        errorText.textContent =
            "Invalid campus email format.";

        return;
    }

});

</script>

{% endblock %}
